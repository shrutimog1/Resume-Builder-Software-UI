<!DOCTYPE html>
<html>
<head>
<title>Select Template</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="template-page">

<h1 class="template-title">Select Your Resume Design</h1>

<div class="template-container">

    <!-- TEMPLATE 1 CORPORATE -->
     <div class="template-option" onclick="selectTemplate('template1')">
        <div class="template1-preview">
            <div class="t1-sidebar"></div>
            <div class="t1-main">
                <h3>Riya Sharma</h3>
                <p>Software Developer</p>
                <div class="line"></div>
                <p>Profile Summary...</p>
                <p>Experience...</p>
                <p>Education...</p>
            </div>
        </div>
    </div>

    <!-- TEMPLATE 2 MODERN CREATIVE -->
     <div class="template-option" onclick="selectTemplate('template2')">
        <div class="template2-preview">
            <div class="t2-header">
                <h3 style="color:white; padding-top:20px;">Aman Verma</h3>
                <p style="color:white;">UI Designer</p>
            </div>
            <div style="padding:15px;">
                <p>Professional Summary...</p>
                <p>Work Experience...</p>
                <p>Education...</p>
            </div>
        </div>
    </div>

    <!-- TEMPLATE 3 ELEGANT MINIMAL -->
    <div class="template-option" onclick="selectTemplate('template3')">
        <div class="template3-preview">
            <div class="t3-topbar"></div>
            <div class="t3-columns">
                <div class="col">
                    <p style="padding:10px;">Contact</p>
                    <p style="padding:10px;">Skills</p>
                </div>
                <div class="col">
                    <h3 style="padding:10px;">Neha Patel</h3>
                    <p style="padding:10px;">Project Manager</p>
                    <p style="padding:10px;">Experience & Education</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
